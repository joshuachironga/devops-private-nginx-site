name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

      - name: Add bastion to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Bastion
        run: |
          ssh -i ~/.ssh/recovery-key -o StrictHostKeyChecking=no \
          -J ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
