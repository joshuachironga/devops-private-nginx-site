name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Bastion
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.BASTION_KEY }}

          script: |
            set -e

            echo "Connected to Bastion"

            # Setup SSH key for private EC2
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh

            printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key
            chmod 600 ~/.ssh/ec2-key

            # Clean previous deployment package
            rm -rf ~/deploy-package

            # Clone latest code from GitHub (ONLY on Bastion)
            git clone https://github.com/joshuachironga/devops-private-nginx-site.git ~/deploy-package

            echo "Sending code to private EC2..."

            rsync -avz -e "ssh -i ~/.ssh/ec2-key -o StrictHostKeyChecking=no" \
              ~/deploy-package/ \
              ubuntu@${{ secrets.EC2_HOST }}:~/devops-private-nginx-site

            echo "Running deployment on private EC2..."

            ssh -i ~/.ssh/ec2-key -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} '
              set -e
              cd ~/devops-private-nginx-site
              chmod +x deploy.sh
              ./deploy.sh
            '

            echo "Deployment finished successfully!"
