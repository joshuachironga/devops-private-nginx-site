name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key + known hosts
        run: |
          mkdir -p ~/.ssh

          # Add private key
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

          # Add bastion + private EC2 to known_hosts
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Bastion
        run: |
          ssh -i ~/.ssh/recovery-key \
              -o ProxyJump=ubuntu@${{ secrets.BASTION_HOST }} \
              ubuntu@${{ secrets.EC2_HOST }} "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
