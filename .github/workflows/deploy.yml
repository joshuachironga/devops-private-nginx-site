name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Add private key
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

          # Add known hosts
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Bastion to Private EC2
        run: |
          ssh -i ~/.ssh/recovery-key ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} "
            ssh -i ~/.ssh/recovery-key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
              set -e

              cd ~/devops-private-nginx-site

              git pull origin main

              chmod +x deploy.sh

              ./deploy.sh
            '
          "
