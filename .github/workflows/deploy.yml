name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # STEP 1: Run command on Bastion
      - name: Deploy on Bastion
        run: |
          ssh -i ~/.ssh/recovery-key ubuntu@${{ secrets.BASTION_HOST }} "
            ssh -i ~/.ssh/recovery-key ubuntu@${{ secrets.EC2_HOST }} '
              cd ~/devops-private-nginx-site &&
              git pull origin main &&
              chmod +x deploy.sh &&
              ./deploy.sh
            '
          "
