name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key (safe format)
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

          # SSH config
          echo "Host bastion" >> ~/.ssh/config
          echo "  HostName ${{ secrets.BASTION_HOST }}" >> ~/.ssh/config
          echo "  User ubuntu" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/recovery-key" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

          echo "Host private-ec2" >> ~/.ssh/config
          echo "  HostName ${{ secrets.EC2_HOST }}" >> ~/.ssh/config
          echo "  User ubuntu" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/recovery-key" >> ~/.ssh/config
          echo "  ProxyJump bastion" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

          chmod 600 ~/.ssh/config

      - name: Test SSH to Bastion
        run: ssh -o ConnectTimeout=10 bastion "echo Connected to Bastion"

      - name: Deploy to Private EC2
        run: |
          ssh private-ec2 "cd ~/devops-private-nginx-site && git pull origin main && chmod +x deploy.sh && ./deploy.sh"
