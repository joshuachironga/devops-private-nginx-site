- name: Deploy via Bastion
  uses: appleboy/ssh-action@v0.1.6
  with:
    host: ${{ secrets.BASTION_IP }}
    username: ubuntu
    key: ${{ secrets.BASTION_KEY }}
    debug: true
    script: |
      echo "Connected to Bastion"
      whoami
      hostname

      echo "Testing SSH to Private EC2..."
      ssh -i ~/.ssh/private.pem -o StrictHostKeyChecking=no ubuntu@10.0.141.140 << 'EOF'
        echo "Inside Private EC2"
        hostname

        cd ~/app

        sudo docker ps -aq | xargs -r sudo docker rm -f
        sudo docker build -t my-app .
        sudo docker run -d -p 80:80 my-app

        echo "Deployment complete"
      EOF
