      - name: Final Debug SSH
        run: |
          ssh -vvv -i ~/.ssh/recovery-key ubuntu@${{ secrets.BASTION_HOST }} "
            ssh -vvv -i ~/.ssh/recovery-key ubuntu@${{ secrets.EC2_HOST }} '
              set -x
              pwd
              ls -la
              cd ~/devops-private-nginx-site || exit 1
              git pull origin main || exit 1
              chmod +x deploy.sh || exit 1
              ./deploy.sh || exit 1
            '
          "
