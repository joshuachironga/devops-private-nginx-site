name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

      - name: Start SSH agent
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/recovery-key

      - name: Deploy via Bastion to Private EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=ubuntu@${{ secrets.BASTION_HOST }} \
              ubuntu@${{ secrets.EC2_HOST }} "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
