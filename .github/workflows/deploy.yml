name: CI/CD Deploy to Private EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via Bastion
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.BASTION_IP }}
        username: ubuntu
        key: ${{ secrets.BASTION_KEY }}
        script: |
          # SSH into private EC2 and deploy
          ssh ubuntu@10.0.141.140 << 'EOF'
            cd ~/app
            git reset --hard          # discard local changes
            git pull origin main      # pull latest from GitHub
            sudo docker ps -aq | xargs -r sudo docker rm -f
            sudo docker build -t my-app .
            sudo docker run -d -p 80:80 my-app
          EOF
