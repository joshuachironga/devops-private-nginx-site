name: CI/CD Deploy to EC2 via Bastion

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

      - name: Add bastion to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to private EC2 via bastion
        run: |
          ssh -i ~/.ssh/key \
          -o StrictHostKeyChecking=no \
          -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
