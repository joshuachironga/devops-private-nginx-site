name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key safely (preserves formatting)
          cat <<EOF > ~/.ssh/recovery-key
${{ secrets.EC2_SSH_KEY }}
EOF

          chmod 600 ~/.ssh/recovery-key

          # SSH config (Bastion + Private EC2)
          cat <<EOF > ~/.ssh/config
Host bastion
  HostName ${{ secrets.BASTION_HOST }}
  User ubuntu
  IdentityFile ~/.ssh/recovery-key
  StrictHostKeyChecking no

Host private-ec2
  HostName ${{ secrets.EC2_HOST }}
  User ubuntu
  IdentityFile ~/.ssh/recovery-key
  ProxyJump bastion
  StrictHostKeyChecking no
EOF

          chmod 600 ~/.ssh/config

      - name: Test SSH to Bastion
        run: |
          ssh -o ConnectTimeout=10 bastion "echo 'Connected to Bastion'"

      - name: Deploy to Private EC2
        run: |
          ssh private-ec2 "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
