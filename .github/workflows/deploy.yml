name: Deploy to Private EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Copy Project to Bastion
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r . \
          ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}:~/app

      - name: Deploy from Bastion to Private EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem \
          ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} << 'EOF'

            scp -o StrictHostKeyChecking=no -r ~/app ubuntu@10.0.141.140:~

            ssh ubuntu@10.0.141.140 << 'INNER'

              cd ~/app
              sudo docker rm -f $(sudo docker ps -aq) || true
              sudo docker build -t my-app .
              sudo docker run -d -p 80:80 my-app

            INNER
          EOF
