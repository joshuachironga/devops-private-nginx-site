name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Load private key
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/recovery-key
          chmod 600 ~/.ssh/recovery-key

          # Trust hosts
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Debug Bastion Connection
        run: |
          ssh -vvv -i ~/.ssh/recovery-key ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} "echo BASTION_OK"

      - name: Debug EC2 Connection via Bastion
        run: |
          ssh -vvv -i ~/.ssh/recovery-key ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} "
            ssh -vvv -i ~/.ssh/recovery-key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
              echo EC2_OK
              whoami
              pwd
              ls -la
            '
          "

      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/recovery-key ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} "
            ssh -i ~/.ssh/recovery-key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
              set -x

              cd ~/devops-private-nginx-site || exit 1

              git pull origin main || exit 1

              chmod +x deploy.sh || exit 1

              ./deploy.sh || exit 1
            '
          "
