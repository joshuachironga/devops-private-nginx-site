name: Bastion Hybrid Deploy (Production Style)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Load private key
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

          # Trust bastion
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

      - name: Upload code to Bastion
        run: |
          rsync -avz -e "ssh -i ~/.ssh/key" \
          ./ ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}:~/deploy-package/

      - name: Deploy to Private EC2 via Bastion
        run: |
          ssh -i ~/.ssh/key ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} "
            rsync -avz -e 'ssh -i ~/.ssh/key' \
            ~/deploy-package/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/devops-private-nginx-site &&

            ssh -i ~/.ssh/key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
              set -e

              cd ~/devops-private-nginx-site

              chmod +x deploy.sh

              ./deploy.sh
            '
          "
