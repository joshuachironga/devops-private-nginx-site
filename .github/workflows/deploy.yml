name: Deploy to EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/key
          chmod 600 ~/.ssh/key
          
          cat > ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/key
            StrictHostKeyChecking no
          
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/key
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          
          chmod 600 ~/.ssh/config

      - name: Deploy via Bastion
        run: |
          ssh ec2 "
            cd ~/devops-private-nginx-site &&
            git pull origin main &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
