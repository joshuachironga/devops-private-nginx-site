echo "Connected to Bastion"

# Write EC2 key to file on bastion (temporary)
echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/github-key
chmod 600 ~/.ssh/github-key

# Clean and clone repo
rm -rf ~/deploy-package
git clone https://github.com/joshuachironga/devops-private-nginx-site.git ~/deploy-package

echo "Sending to private EC2..."

rsync -avz -e "ssh -i ~/.ssh/github-key -o StrictHostKeyChecking=no" \
  ~/deploy-package/ \
  ubuntu@${{ secrets.EC2_HOST }}:~/devops-private-nginx-site

echo "Deploying on EC2..."

ssh -i ~/.ssh/github-key -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} '
  cd ~/devops-private-nginx-site
  chmod +x deploy.sh
  ./deploy.sh
'
