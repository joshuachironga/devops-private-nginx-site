name: Deploy to Private EC2 via Bastion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

      - name: Add bastion + private to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via Bastion to Private EC2
        run: |
          ssh -i ~/.ssh/key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -J ubuntu@${{ secrets.BASTION_HOST }} \
            ubuntu@${{ secrets.EC2_HOST }} "
              cd ~/devops-private-nginx-site &&
              git pull origin main &&
              chmod +x deploy.sh &&
              ./deploy.sh
            "
